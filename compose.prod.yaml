services:
  hermes:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: hermes
    container_name: helios-hermes
    # rootless nerdctl 将容器 UID 0 映射为当前宿主用户，以读取 0600 配置。
    user: "0:0"
    ports:
      - "50051:50051"
      - "8081:18000"
    volumes:
      - ./hermes/config.toml:/app/hermes/config.toml:ro
    environment:
      HERMES_DB_URL: mysql://helios:helios@db:3306/hermes?charset=utf8mb4&parseTime=true&loc=Local&timeout=10s&readTimeout=30s&writeTimeout=30s
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:18000/health >/dev/null"]
      interval: 2s
      timeout: 2s
      retries: 30
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  aegis:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: aegis
    container_name: helios-aegis
    user: "0:0"
    ports:
      - "18000:18000"
    volumes:
      - ./aegis/config.toml:/app/aegis/config.toml:ro
    environment:
      HERMES_GRPC_ADDR: hermes:50051
      AEGIS_REDIS_URL: redis://:helios@cache:6379/0
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:18000/health >/dev/null"]
      interval: 2s
      timeout: 2s
      retries: 30
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  zwei:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: zwei
    container_name: helios-zwei
    user: "0:0"
    ports:
      - "18001:18000"
    volumes:
      - ./zwei/config.toml:/app/zwei/config.toml:ro
    environment:
      ZWEI_DB_URL: mysql://helios:helios@db:3306/zwei?charset=utf8mb4&parseTime=true&loc=Local&timeout=10s&readTimeout=30s&writeTimeout=30s
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:18000/health >/dev/null"]
      interval: 2s
      timeout: 2s
      retries: 30
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  chaos:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: chaos
    container_name: helios-chaos
    user: "0:0"
    ports:
      - "18002:18000"
    volumes:
      - ./chaos/config.toml:/app/chaos/config.toml:ro
    environment:
      CHAOS_DB_URL: mysql://helios:helios@db:3306/chaos?charset=utf8mb4&parseTime=true&loc=Local&timeout=10s&readTimeout=30s&writeTimeout=30s
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:18000/health >/dev/null"]
      interval: 2s
      timeout: 2s
      retries: 30
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"

  gateway:
    image: nginx:alpine
    container_name: helios-gateway
    ports:
      - "80:80"
    volumes:
      - ./environments/gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    stop_grace_period: 10s
