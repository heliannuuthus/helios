[app]
name = "Hermes"
version = "dev"
debug = true

[log]
level = "debug"
format = "console"

[server]
host = "0.0.0.0"
port = 18000

[db]
url = "mysql://helios:helios@127.0.0.1:3306/hermes?charset=utf8mb4&parseTime=true&loc=Local&timeout=10s&readTimeout=30s&writeTimeout=30s"
# 由 scripts/initialize-hermes.py 生成，必须与数据库密文匹配。
enc-key = ""
slow-threshold = "200ms"

[db.pool]
max-idle-conns = 10
max-open-conns = 50
conn-max-lifetime = "1h"
conn-max-idle-time = "10m"

[aegis]
audience = "hermes"
issuer = "https://aegis.heliannuuthus.com/api"
# 由 scripts/initialize-hermes.py 生成。
secret-key = ""

[idp-defaults.github]
delegate = ""
require = ""

[idp-defaults.google]
delegate = ""
require = ""
