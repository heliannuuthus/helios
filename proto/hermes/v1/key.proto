syntax = "proto3";

package hermes.v1;

option go_package = "github.com/heliannuuthus/helios/proto/hermes/v1;hermesv1";

// KeyService aegis 读取签名密钥 + 解析 IDP 凭证的只读接口
service KeyService {
  rpc GetKeys(GetKeysRequest) returns (KeySet);
  rpc ResolveIDPKey(ResolveIDPKeyRequest) returns (ResolveIDPKeyResponse);
}

message GetKeysRequest {
  string owner_type = 1; // domain / application / service
  string owner_id = 2;
}

// KeySet 密钥集合（已解密）
message KeySet {
  bytes main = 1;           // 当前主密钥（48 字节 seed）
  repeated bytes keys = 2;  // 所有有效密钥（含轮换中旧密钥，按 created_at DESC）
}

message ResolveIDPKeyRequest {
  string app_id = 1;
  string idp_type = 2;
}

message ResolveIDPKeyResponse {
  string t_app_id = 1;
  string t_secret = 2;
}
