syntax = "proto3";

package hermes.v1;

option go_package = "github.com/heliannuuthus/helios/proto/hermes/v1;hermesv1";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "hermes/v1/common.proto";

// AppService 域 + 应用 + IDP 配置 + 应用服务关系管理
// 注：Domain 的创建和删除由 DB 迁移脚本管理，不通过 API 暴露
// 注：Application 暂不提供 Delete，通过管理后台 DB 操作处理
service AppService {
  // ---- Domain（域数量固定，ListDomains 不分页） ----

  rpc GetDomain(GetDomainRequest) returns (Domain);
  rpc ListDomains(google.protobuf.Empty) returns (DomainList);
  rpc UpdateDomain(UpdateDomainRequest) returns (Domain);
  rpc GetDomainAllowedIDPs(GetDomainRequest) returns (StringList);

  // ---- Application ----

  rpc CreateApplication(CreateApplicationRequest) returns (Application);
  rpc GetApplication(GetApplicationRequest) returns (Application);
  rpc ListApplications(ListApplicationsRequest) returns (ApplicationList);
  rpc UpdateApplication(UpdateApplicationRequest) returns (Application);

  // ---- Application IDP Config ----

  rpc GetApplicationIDPConfigs(GetApplicationRequest) returns (ApplicationIDPConfigList);
  rpc CreateApplicationIDPConfig(CreateApplicationIDPConfigRequest) returns (ApplicationIDPConfig);
  rpc UpdateApplicationIDPConfig(UpdateApplicationIDPConfigRequest) returns (ApplicationIDPConfig);
  rpc DeleteApplicationIDPConfig(DeleteApplicationIDPConfigRequest) returns (google.protobuf.Empty);

  // ---- Application-Service Relation ----

  rpc SetApplicationServiceRelations(SetApplicationServiceRelationsRequest) returns (google.protobuf.Empty);
  rpc GetApplicationServiceRelations(GetApplicationRequest) returns (ApplicationServiceRelationList);
  rpc GetServiceAppRelations(GetServiceAppRelationsRequest) returns (StringList);
}

// ==================== Domain ====================

message GetDomainRequest {
  string domain_id = 1;
}

message Domain {
  string domain_id = 1;
  string name = 2;
  optional string description = 3;
  repeated string allowed_idps = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message DomainList {
  repeated Domain domains = 1;
}

message UpdateDomainRequest {
  string domain_id = 1;
  optional string name = 2;
  optional string description = 3;
}

// ==================== Application ====================

message GetApplicationRequest {
  string app_id = 1;
}

message Application {
  uint32 id = 1;
  string domain_id = 2;
  string app_id = 3;
  string name = 4;
  optional string description = 5;
  optional string logo_url = 6;
  repeated string allowed_redirect_uris = 7;
  repeated string allowed_origins = 8;
  repeated string allowed_logout_uris = 9;
  uint32 id_token_expires_in = 10;
  uint32 refresh_token_expires_in = 11;
  uint32 refresh_token_absolute_expires_in = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
}

message ApplicationList {
  repeated Application applications = 1;
  string next_cursor = 2;
}

message CreateApplicationRequest {
  string domain_id = 1;
  optional string app_id = 2;
  string name = 3;
  string description = 4;
  repeated string allowed_redirect_uris = 5;
  repeated string allowed_origins = 6;
  repeated string allowed_logout_uris = 7;
  bool need_key = 8;
  optional uint32 id_token_expires_in = 9;
  optional uint32 refresh_token_expires_in = 10;
  optional uint32 refresh_token_absolute_expires_in = 11;
}

message UpdateApplicationRequest {
  string app_id = 1;
  optional string name = 2;
  optional string description = 3;
  optional string logo_url = 4;
  // URI 列表用 wrapper 区分"未传"和"传空数组清除"
  OptionalStringList allowed_redirect_uris = 5;
  OptionalStringList allowed_origins = 6;
  OptionalStringList allowed_logout_uris = 7;
  optional uint32 id_token_expires_in = 8;
  optional uint32 refresh_token_expires_in = 9;
  optional uint32 refresh_token_absolute_expires_in = 10;
}

// OptionalStringList 可选字符串列表（区分缺失 vs 空列表）
// present=false: 不更新；present=true + values 空: 清除；present=true + values 非空: 更新
message OptionalStringList {
  bool present = 1;
  repeated string values = 2;
}

message ListApplicationsRequest {
  string domain_id = 1;
  string filter = 2;
  Pagination pagination = 3;
}

// ==================== Application IDP Config ====================

message ApplicationIDPConfig {
  uint32 id = 1;
  string app_id = 2;
  string type = 3;
  int32 priority = 4;
  optional string strategy = 5;
  optional string delegate = 6;
  optional string require = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message ApplicationIDPConfigList {
  repeated ApplicationIDPConfig configs = 1;
}

message CreateApplicationIDPConfigRequest {
  string app_id = 1;
  string type = 2;
  int32 priority = 3;
  optional string strategy = 4;
  optional string delegate = 5;
  optional string require = 6;
}

message UpdateApplicationIDPConfigRequest {
  string app_id = 1;
  string type = 2;
  optional int32 priority = 3;
  optional string strategy = 4;
  optional string delegate = 5;
  optional string require = 6;
}

message DeleteApplicationIDPConfigRequest {
  string app_id = 1;
  string type = 2;
}

// ==================== Application-Service Relation ====================

message ApplicationServiceRelation {
  uint32 id = 1;
  string app_id = 2;
  string service_id = 3;
  string relation = 4;
  google.protobuf.Timestamp created_at = 5;
}

message ApplicationServiceRelationList {
  repeated ApplicationServiceRelation relations = 1;
}

message SetApplicationServiceRelationsRequest {
  string app_id = 1;
  string service_id = 2;
  repeated string relations = 3;
}

message GetServiceAppRelationsRequest {
  string service_id = 1;
  string app_id = 2;
}
