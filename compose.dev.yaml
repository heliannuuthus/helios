services:
  gateway:
    image: nginx:alpine
    container_name: helios-gateway
    volumes:
      - ./environments/gateway/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    stop_grace_period: 10s

  https-proxy:
    image: nginx:alpine
    container_name: helios-https-proxy
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./environments/https-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./environments/certs:/etc/nginx/ssl:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.1"
    stop_grace_period: 10s
